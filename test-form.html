<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Tip Creation</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: 600;
      color: #555;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #000;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .receipt-link {
      margin-top: 10px;
      padding: 10px;
      background: #e7f3ff;
      border-radius: 6px;
      word-break: break-all;
    }
    .receipt-link a {
      color: #0066cc;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>🧪 Test Tip Creation</h1>
    <form id="tipForm">
      <label for="receiverId">Receiver User ID *</label>
      <input type="text" id="receiverId" required 
             placeholder="12345678-1234-1234-1234-123456789abc">
      <small style="color: #666; display: block; margin-top: 5px;">
        Find this in Supabase Dashboard → Authentication → Users
      </small>

      <label for="amount">Amount (USD) *</label>
      <input type="number" id="amount" required min="1" step="0.01" value="10.00">

      <label for="tipperName">Tipper Name</label>
      <input type="text" id="tipperName" placeholder="Anonymous Supporter">

      <label for="receiptEmail">Receipt Email</label>
      <input type="email" id="receiptEmail" placeholder="supporter@example.com">

      <label for="note">Note</label>
      <textarea id="note" rows="3" placeholder="Thanks for the great work!"></textarea>

      <button type="submit" id="submitBtn">Create Tip</button>
    </form>

    <div id="result" class="result"></div>
  </div>

  <script>
    const form = document.getElementById('tipForm');
    const submitBtn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating tip...';
      resultDiv.style.display = 'none';

      const data = {
        receiver_user_id: document.getElementById('receiverId').value,
        amount: parseFloat(document.getElementById('amount').value),
        tipper_name: document.getElementById('tipperName').value || null,
        receipt_email: document.getElementById('receiptEmail').value || null,
        note: document.getElementById('note').value || null,
      };

      try {
        const response = await fetch('/api/tips/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok && result.receipt_id) {
          const receiptUrl = `${window.location.origin}/r/${result.receipt_id}`;
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            <strong>✅ Tip created successfully!</strong><br>
            <div class="receipt-link">
              📧 Receipt ID: <strong>${result.receipt_id}</strong><br>
              🔗 <a href="${receiptUrl}" target="_blank">View Receipt</a>
            </div>
          `;
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = `
            <strong>❌ Error:</strong><br>
            ${result.error || 'Unknown error occurred'}
          `;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `
          <strong>❌ Network Error:</strong><br>
          ${error.message}
        `;
      } finally {
        resultDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Tip';
      }
    });
  </script>
</body>
</html>
